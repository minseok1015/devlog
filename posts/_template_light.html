<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글 제목 — devlog</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f1f4;
    --surface: #ffffff;
    --surface2: #e8e9ed;
    --border: #dde0e8;
    --accent: #5b4ef0;
    --accent2: #1a9e75;
    --accent3: #e05c2a;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-dim: #b0b3bf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    line-height: 1.8;
  }

  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav {
    background: rgba(240,241,244,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }

  .nav-links {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .nav-links a:hover { color: var(--text); }

  /* CONTAINER */
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* POST HERO */
  .post-hero {
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .post-hero::before {
    content: '';
    position: absolute;
    top: -100px; left: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(91,78,240,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .breadcrumb a { color: var(--text-dim); }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb span { margin: 0 8px; }

  .post-tags { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
  }

  .tag-be  { background: #e8f1fc; color: #185fa5; border: 1px solid #c5d9f5; }
  .tag-inf { background: #eaf4e2; color: #3b6d11; border: 1px solid #c4dca8; }
  .tag-cs  { background: #eeeafd; color: #4a3db5; border: 1px solid #cec7f8; }
  .tag-log { background: #fdf0e4; color: #944d10; border: 1px solid #f5d0a8; }

  .post-hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .post-hero h1 em { font-style: normal; color: var(--accent); }

  .post-subtitle {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 580px;
    margin-bottom: 24px;
  }

  .post-meta-row {
    display: flex;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ARTICLE */
  article { padding: 48px 0 60px; }

  h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    margin: 52px 0 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  h2::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 36px; height: 2px;
    background: var(--accent);
  }

  h3 {
    font-size: 18px;
    font-weight: 700;
    margin: 32px 0 10px;
    color: var(--text);
  }

  p { margin-bottom: 16px; color: var(--text); }

  ul, ol { padding-left: 22px; margin-bottom: 16px; }
  ul li, ol li { margin-bottom: 8px; }

  /* CODE */
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin: 20px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
  }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--accent);
  }

  pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
  }

  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  td {
    padding: 10px 14px;
    border: 1px solid var(--border);
    vertical-align: top;
  }

  tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

  /* CALLOUT */
  .callout {
    border-left: 3px solid var(--accent);
    background: rgba(91,78,240,0.05);
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    margin: 18px 0;
    font-size: 14.5px;
  }

  .callout.warn {
    border-left-color: var(--accent3);
    background: rgba(224,92,42,0.05);
  }

  .callout.success {
    border-left-color: var(--accent2);
    background: rgba(26,158,117,0.05);
  }

  /* LOG BLOCK */
  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 18px;
    margin: 16px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.9;
    overflow-x: auto;
    white-space: pre;
  }

  /* BACK LINK */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    padding: 48px 0 0;
    transition: color 0.15s;
  }

  .back-link:hover { color: var(--accent); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 36px 0;
    margin-top: 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">$ devlog</a>
  <div class="nav-links">
    <a href="../index.html">Posts</a>
    <a href="../about.html">About</a>
    <a href="https://github.com" target="_blank">GitHub</a>
  </div>
</nav>

<div class="container">

  <div class="post-hero">
    <div class="breadcrumb">
      <a href="../index.html">Posts</a>
      <span>/</span>
      카테고리
    </div>

    <div class="post-tags">
      <span class="tag tag-be">백엔드</span>
    </div>

    <h1>글 <em>제목</em>을 여기에</h1>

    <p class="post-subtitle">
      한 두 줄 분량의 글 소개를 여기에 씁니다.
    </p>

    <div class="post-meta-row">
      <span>2026.00.00</span>
      <span>0 min read</span>
      <span>태그 · 태그</span>
    </div>
  </div>

  <article>

    <h2>섹션 제목</h2>
    <p>본문 내용을 여기에 씁니다.</p>

    <!-- 코드 블록 -->
<pre><code>// 코드를 여기에
</code></pre>

    <!-- 로그 블록 -->
    <div class="log">로그 내용을 여기에</div>

    <!-- 콜아웃 -->
    <div class="callout">일반 메모</div>
    <div class="callout warn">⚠️ 주의 사항</div>
    <div class="callout success">✅ 성공 / 결론</div>

    <!-- 표 -->
    <table>
      <thead><tr><th>항목</th><th>값</th></tr></thead>
      <tbody>
        <tr><td>예시</td><td>예시값</td></tr>
      </tbody>
    </table>

    <a class="back-link" href="../index.html">← 목록으로 돌아가기</a>

  </article>

</div>

<footer>
  © 2026 devlog · Built with HTML/CSS · Hosted on GitHub Pages
</footer>

</body>
</html>
